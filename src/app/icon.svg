<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- the three mode accents: music (blue) → movies (clay) → books (sage) -->
    <linearGradient id="spin" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4f7fd6"/>
      <stop offset="0.5" stop-color="#c89642"/>
      <stop offset="1" stop-color="#5fb255"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#spin)"/>
  <rect x="7" y="7" width="18" height="18" rx="5" fill="none" stroke="#ffffff" stroke-width="2"/>
  <circle cx="12" cy="12" r="2" fill="#ffffff"/>
  <circle cx="16" cy="16" r="2" fill="#ffffff"/>
  <circle cx="20" cy="20" r="2" fill="#ffffff"/>
</svg>
