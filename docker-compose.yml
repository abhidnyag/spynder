# One-command MySQL (+ Adminer DB browser) for local development.
#   docker compose up -d      # start everything in the background
#   docker compose down       # stop it (data is kept in the named volume)
#   docker compose down -v     # stop it and DELETE all data
#
# MySQL matches the DATABASE_URL in .env.example:
#   mysql://root:spinder@localhost:3306/spinder
# Adminer (browse the DB) runs at http://localhost:8080
#   System: MySQL · Server: mysql · Username: root · Password: spinder · Database: spinder

services:
  mysql:
    image: mysql:8.4
    container_name: spinder-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: spinder
      MYSQL_DATABASE: spinder
    ports:
      - "3306:3306"
    volumes:
      - spinder-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pspinder"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:5
    container_name: spinder-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  spinder-mysql-data:
